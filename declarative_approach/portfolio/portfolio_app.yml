apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: portfolio-web
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Dipesh-Vishwakarma/Monitoring-logs-Metrics-VM.git    # Replace it with your forked repo
    targetRevision: main
    path: declarative_approach/portfolio
  destination:
    server: https://172.31.33.150:33893   # Replace with your Cluster Url, To get run: `argocd cluster list`
    namespace: app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    
