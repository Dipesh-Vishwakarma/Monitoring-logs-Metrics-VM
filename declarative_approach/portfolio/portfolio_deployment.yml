apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-webapp
  namespace: app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
      - name: portfolio-webapp
        image: dipesh767/web-application:v1
        ports:
        - containerPort: 5000
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
